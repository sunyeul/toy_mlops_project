stages:
  featurization:
    cmd: python src/featurization.py
    deps:
      - data/raw/train_data.csv
      - data/raw/test_data.csv
      - src/featurization.py
    outs:
      - data/processed/train_data.npy
      - data/processed/test_data.npy
      - data/processed/norm_params.json
  training:
    cmd: python src/train_model.py
    deps:
      - data/processed/train_data.npy
      - src/train_model.py
    metrics:
      - metrics/train_metric.json
    outs:
      - models/model.pkl
  evaluation:
    cmd: python src/evaluation.py
    deps:
      - data/processed/test_data.npy
      - models/model.pkl
      - src/evaluation.py
    metrics:
      - metrics/eval.json
